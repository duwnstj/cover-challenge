version: "3.8"

services:
  app:
    build: .
    container_name: cover-app
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE} # prod 주입
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL} # AWS RDS 엔드포인트 주입
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
    networks:
      - internal
    healthcheck:
      # [최적화] 운영 환경 사양에 맞춘 안전한 wget 기반 헬스체크
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/api/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: cover-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - internal

networks:
  internal:
    driver: bridge
