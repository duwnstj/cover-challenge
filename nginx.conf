events {
    worker_connections 1024;  # Nginx 워커 프로세스당 최대 동시 연결 수
}

http {
    upstream app {
        server app:8080;      # Docker 내부 네트워크에서 app 컨테이너의 8080으로 연결
                              # 'app'은 docker-compose의 서비스명 — DNS로 자동 해석
    }

    server {
        listen 80;            # 외부에서 들어오는 80 포트 요청 수신

        location / {
            proxy_pass http://app;                              # upstream으로 요청 전달

            proxy_set_header Host $host;                        # 원본 도메인 정보 유지
            proxy_set_header X-Real-IP $remote_addr;           # 클라이언트 진짜 IP 전달
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 프록시 경유 IP 체인 전달
            proxy_set_header X-Forwarded-Proto $scheme;        # http/https 정보 전달

            proxy_connect_timeout 60s;   # app 연결 대기 최대 60초
            proxy_read_timeout 60s;      # app 응답 대기 최대 60초
        }
    }
}